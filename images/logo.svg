<svg xmlns="http://www.w3.org/2000/svg" width="180" height="60" viewBox="0 0 180 60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#1341a8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Graduation cap icon -->
  <text x="30" y="42" font-size="30" text-anchor="middle" fill="white">🎓</text>
  <!-- Text area -->
  <text x="72" y="24" font-family="Arial,sans-serif" font-size="13" font-weight="900" fill="#0a0f1e">أكاديمية عايد</text>
  <text x="72" y="40" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#6b7280">للتدريب</text>
  <!-- STEP badge -->
  <rect x="70" y="45" width="60" height="13" rx="6" fill="url(#gold)"/>
  <text x="100" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="900" text-anchor="middle" fill="#0a0f1e">STEP 2026</text>
</svg>
